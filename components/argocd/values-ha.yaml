# values-ha.yaml
# ArgoCD values para entorno HA (producción/EKS)
# Referencia - no usar en kind local

redis-ha:
  enabled: true

controller:
  replicas: 1

server:
  replicas: 2

repoServer:
  replicas: 2

applicationSet:
  replicas: 2

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
