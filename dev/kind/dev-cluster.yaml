kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: dev-cluster
# Habilita versiones beta de las APIs de autenticación y admission
# (compatibilidad con componentes que usan v1beta1 en lugar de v1 estable)
runtimeConfig:
  "authentication.k8s.io/v1beta1": true
  "admissionregistration.k8s.io/v1beta1": true
networking:
  # API server accesible desde todas las interfaces del host (permite acceso externo al cluster)
  apiServerAddress: "0.0.0.0"
  # CNI desactivado: se instala Cilium manualmente post-creación
  disableDefaultCNI: true
  apiServerPort: 6450
  # CIDRs separados de pro (10.30/10.40) para facilitar Istio multicluster futuro
  podSubnet: "10.10.0.0/16"
  serviceSubnet: "10.20.0.0/16"
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiServer:
            extraArgs:
              enable-admission-plugins: NodeRestriction,MutatingAdmissionWebhook,ValidatingAdmissionWebhook
    extraPortMappings:
      # etcd expuesto para acceso directo desde host (debugging, backup)
      - containerPort: 2379
        hostPort: 2090
    extraMounts:
      # Requerido por Falco para AppArmor (labs CKS)
      - hostPath: /sys/kernel/security
        containerPath: /sys/kernel/security
      # Requerido por Falco para acceso a dispositivos del kernel (labs CKS)
      - hostPath: /dev
        containerPath: /dev
      # Requerido por Falco con Docker runtime (labs CKS)
      - hostPath: /var/run/docker.sock
        containerPath: /var/run/docker.sock
  - role: worker
    extraPortMappings:
      # Fallback NodePort para HTTP cuando MetalLB IPs no son accesibles (VPN/red diferente)
      - containerPort: 80
        hostPort: 9090
      # Fallback NodePort para HTTPS
      - containerPort: 443
        hostPort: 8440
      # Puerto reservado para bastion/jump pod con servidor SSH
      - containerPort: 2222
        hostPort: 2030
    # Mounts para Falco (labs CKS) — ver comentarios en control-plane
    extraMounts:
      - hostPath: /sys/kernel/security
        containerPath: /sys/kernel/security
      - hostPath: /dev
        containerPath: /dev
      - hostPath: /var/run/docker.sock
        containerPath: /var/run/docker.sock
  - role: worker
    # Misma configuración que worker-1, hostPorts incrementados para evitar conflictos
    extraPortMappings:
      - containerPort: 80
        hostPort: 9091
      - containerPort: 443
        hostPort: 8441
      - containerPort: 2222
        hostPort: 2031
    # Mounts para Falco (labs CKS) — ver comentarios en control-plane
    extraMounts:
      - hostPath: /sys/kernel/security
        containerPath: /sys/kernel/security
      - hostPath: /dev
        containerPath: /dev
      - hostPath: /var/run/docker.sock
        containerPath: /var/run/docker.sock
  - role: worker
    # Misma configuración que worker-1, hostPorts incrementados para evitar conflictos
    extraPortMappings:
      - containerPort: 80
        hostPort: 9092
      - containerPort: 443
        hostPort: 8442
      - containerPort: 2222
        hostPort: 2032
    # Mounts para Falco (labs CKS) — ver comentarios en control-plane
    extraMounts:
      - hostPath: /sys/kernel/security
        containerPath: /sys/kernel/security
      - hostPath: /dev
        containerPath: /dev
      - hostPath: /var/run/docker.sock
        containerPath: /var/run/docker.sock
