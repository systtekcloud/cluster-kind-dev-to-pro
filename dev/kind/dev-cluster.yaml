kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: dev-cluster
runtimeConfig:
  "authentication.k8s.io/v1beta1": true
  "admissionregistration.k8s.io/v1beta1": true
networking:
  apiServerAddress: "0.0.0.0"
  disableDefaultCNI: true
  apiServerPort: 6450
  podSubnet: "10.10.0.0/16"
  serviceSubnet: "10.20.0.0/16"
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiServer:
            extraArgs:
              enable-admission-plugins: NodeRestriction,MutatingAdmissionWebhook,ValidatingAdmissionWebhook
    extraPortMappings:
      - containerPort: 2379
        hostPort: 2090
    extraMounts:
      - hostPath: /sys/kernel/security
        containerPath: /sys/kernel/security
      - hostPath: /dev
        containerPath: /dev
        # allow Falco to use the Docker unix socket
      - hostPath: /var/run/docker.sock
        containerPath: /var/run/docker.sock
  - role: worker
    extraPortMappings:
      - containerPort: 80
        hostPort: 9090
      - containerPort: 443
        hostPort: 8440
      - containerPort: 2222
        hostPort: 2030
    extraMounts:
      - hostPath: /sys/kernel/security
        containerPath: /sys/kernel/security
      - hostPath: /dev
        containerPath: /dev
        # allow Falco to use the Docker unix socket
      - hostPath: /var/run/docker.sock
        containerPath: /var/run/docker.sock
  - role: worker
    extraPortMappings:
      - containerPort: 80
        hostPort: 9091
      - containerPort: 443
        hostPort: 8441
      - containerPort: 2222
        hostPort: 2031
    extraMounts:
      - hostPath: /sys/kernel/security
        containerPath: /sys/kernel/security
      - hostPath: /dev
        containerPath: /dev
        # allow Falco to use the Docker unix socket
      - hostPath: /var/run/docker.sock
        containerPath: /var/run/docker.sock
  - role: worker
    extraPortMappings:
      - containerPort: 80
        hostPort: 9092
      - containerPort: 443
        hostPort: 8442
      - containerPort: 2222
        hostPort: 2032
    extraMounts:
      - hostPath: /sys/kernel/security
        containerPath: /sys/kernel/security
      - hostPath: /dev
        containerPath: /dev
        # allow Falco to use the Docker unix socket
      - hostPath: /var/run/docker.sock
        containerPath: /var/run/docker.sock
