apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  # Nombre específico de entorno para evitar conflictos en configuraciones multicluster futuras
  name: dev-pool
  namespace: metallb-system
spec:
  addresses:
    # Rango reservado para dev. Verificar con: docker network inspect kind | grep -A5 IPAM
    - 172.18.0.120-172.18.0.130
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: dev-l2-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
    - dev-pool
