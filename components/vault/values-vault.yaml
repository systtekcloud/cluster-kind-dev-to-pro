# Vault - override de producción
# Modo: HA con Raft integrado (3 pods, quorum, sin dependencias externas)
# Uso: helm upgrade --install pan-platform charts/pan-platform -f helm-values/prod/platform/vault-values.yaml

vault:
  enabled: true
  server:
    ha:
      enabled: true
      replicas: 3
      raft:
        enabled: true
        # Cada pod usa su nombre como node ID de Raft (vault-0, vault-1, vault-2)
        setNodeId: true

    dataStorage:
      enabled: true
      size: 5Gi
      storageClass: standard # Kind default storage class
      accessMode: ReadWriteOnce

    resources:
      requests:
        memory: 256Mi
        cpu: 250m
      limits:
        memory: 256Mi
        cpu: 250m

    # Anti-afinidad estricta: un pod de Vault por nodo, obligatorio
    affinity: |
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: vault
                component: server
            topologyKey: kubernetes.io/hostname

    service:
      enabled: true
      type: ClusterIP

  # Las apps consumen secretos directamente via SDK propio, el injector no es necesario
  injector:
    enabled: true

  ui:
    enabled: true
  
  extraEnvironmentVars:
    VAULT_LOG_LEVEL: "debug"

