# Vault Secrets Operator - override de produccion
# Uso: helm upgrade --install pan-platform charts/pan-platform \
#        -f helm-values/prod/platform/vault-values.yaml \
#        -f helm-values/prod/platform/vso-values.yaml

vso:
  enabled: true
  # Conexion por defecto al servidor Vault del cluster
  # Asume release name "pan-platform" y namespace "pan-platform"
  defaultVaultConnection:
    enabled: true
    address: "http://vault.vault.svc.cluster.local:8200"

  defaultAuthMethod:
    enabled: true
    namespace: vault
    method: kubernetes
    mount: kubernetes
    kubernetes:
      # ServiceAccount que usa VSO para autenticarse en Vault
      serviceAccount: vso-sa
      # Role de Vault que mapea el ServiceAccount con las policies
      role: vso-role

  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 250m
