kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: prod-cluster
runtimeConfig:
  "authentication.k8s.io/v1beta1": true
  "admissionregistration.k8s.io/v1beta1": true
networking:
  apiServerAddress: "0.0.0.0"
  disableDefaultCNI: true
  apiServerPort: 6451
  podSubnet: "10.30.0.0/16"
  serviceSubnet: "10.40.0.0/16"
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiServer:
            extraArgs:
              enable-admission-plugins: NodeRestriction,MutatingAdmissionWebhook,ValidatingAdmissionWebhook
    extraPortMappings:
      - containerPort: 2379
        hostPort: 2190
    extraMounts:
      - hostPath: /sys/kernel/security
        containerPath: /sys/kernel/security
      - hostPath: /dev
        containerPath: /dev
        # allow Falco to use the Docker unix socket
      - hostPath: /var/run/docker.sock
        containerPath: /var/run/docker.sock
  - role: worker
    extraPortMappings:
      - containerPort: 80
        hostPort: 9093
      - containerPort: 443
        hostPort: 8450
      - containerPort: 2222
        hostPort: 2130
    extraMounts:
      - hostPath: /sys/kernel/security
        containerPath: /sys/kernel/security
      - hostPath: /dev
        containerPath: /dev
        # allow Falco to use the Docker unix socket
      - hostPath: /var/run/docker.sock
        containerPath: /var/run/docker.sock
  - role: worker
    extraPortMappings:
      - containerPort: 80
        hostPort: 9094
      - containerPort: 443
        hostPort: 8451
      - containerPort: 2222
        hostPort: 2131
    extraMounts:
      - hostPath: /sys/kernel/security
        containerPath: /sys/kernel/security
      - hostPath: /dev
        containerPath: /dev
        # allow Falco to use the Docker unix socket
      - hostPath: /var/run/docker.sock
        containerPath: /var/run/docker.sock
  - role: worker
    extraPortMappings:
      - containerPort: 80
        hostPort: 9195
      - containerPort: 443
        hostPort: 8452
      - containerPort: 2222
        hostPort: 2132
    extraMounts:
      - hostPath: /sys/kernel/security
        containerPath: /sys/kernel/security
      - hostPath: /dev
        containerPath: /dev
        # allow Falco to use the Docker unix socket
      - hostPath: /var/run/docker.sock
        containerPath: /var/run/docker.sock
