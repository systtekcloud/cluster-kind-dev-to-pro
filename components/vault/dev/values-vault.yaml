# values-vault.yaml — dev (kind)
# Modo: standalone, sin HA, recursos mínimos

server:
  ha:
    enabled: false

  dataStorage:
    enabled: true
    size: 1Gi
    storageClass: standard   # storage class por defecto en kind
    accessMode: ReadWriteOnce

  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m

  # Igual que en pro: acepta exit 2 (sellado) para que helm --wait no haga timeout
  readinessProbe:
    enabled: true
    exec:
      command:
        - /bin/sh
        - -c
        - vault status -tls-skip-verify; ec=$?; [ $ec -eq 0 ] || [ $ec -eq 2 ]

  service:
    enabled: true
    type: ClusterIP

  extraEnvironmentVars:
    VAULT_LOG_LEVEL: "debug"

injector:
  enabled: true

ui:
  enabled: true
